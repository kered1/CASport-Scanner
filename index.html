<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CASPORT Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    text-align:center;
}
header{
    background:#6e0f13;
    color:white;
    padding:18px;
    font-size:24px;
    font-weight:bold;
}
#reader{
    width:95%;
    max-width:450px;
    margin:20px auto;
}
#status{
    margin:15px;
    font-size:18px;
    font-weight:bold;
    color:#6e0f13;
    word-break:break-word;
}
button{
    padding:12px 24px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#6e0f13;
    color:white;
    cursor:pointer;
    margin:6px;
}
button:hover{
    opacity:.9;
}
#confirmBox{
    display:none;
    margin:15px auto;
    max-width:450px;
    background:white;
    border:2px solid #6e0f13;
    border-radius:12px;
    padding:20px;
}
#confirmText{
    font-size:20px;
    font-weight:bold;
    color:#333;
    margin-bottom:15px;
}
.confirmBtns button{
    min-width:100px;
}
#noBtn{
    background:#777;
}
</style>
</head>
<body>
<header>
CASPORT Scanner
</header>
<div id="reader"></div>
<button onclick="startScanner()">
Start Scanner
</button>
<div id="confirmBox">
  <div id="confirmText"></div>
  <div class="confirmBtns">
    <button id="yesBtn" onclick="confirmScan()">Yes</button>
    <button id="noBtn" onclick="cancelScan()">No</button>
  </div>
</div>
<div id="status">
Waiting...
</div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxF4tlIjmsm9zOjllu6wtHu16smHPOSUltu-7MEKBh5FQByksyKpsdiCZBjzId27wYmag/exec";

let scanner;
let isProcessing = false;
let pendingScan = null;

function getSheetId(){
  const params = new URLSearchParams(window.location.search);
  return params.get("sheet");
}

function startScanner(){
document.getElementById("status").innerHTML="Opening camera...";
scanner = new Html5Qrcode("reader");
scanner.start(
{ facingMode:"environment" },
{
fps:10,
qrbox:250
},
onScanSuccess,
onScanFailure
).catch(err=>{
document.getElementById("status").innerHTML=
err;
});
}

function onScanSuccess(decodedText){
  if(isProcessing) return;
  isProcessing = true;

  scanner.pause();

  const parts = decodedText.split(";");
  const name = parts[0] ? parts[0].trim() : "";
  const studentId = parts[1] ? parts[1].trim() : "";
  const sheetId = getSheetId();

  if(!sheetId){
    document.getElementById("status").innerHTML = "🔴 No sheet ID in URL.";
    resumeAfterDelay();
    return;
  }

  if(!name || !studentId){
    document.getElementById("status").innerHTML = "🔴 Invalid QR format.";
    resumeAfterDelay();
    return;
  }

  pendingScan = { sheetId, name, studentId };

  document.getElementById("status").innerHTML = "";
  document.getElementById("confirmText").innerHTML =
    "Confirm to Scan<br>\"" + name + "\" with \"" + studentId + "\"?";
  document.getElementById("confirmBox").style.display = "block";
}

function confirmScan(){
  if(!pendingScan) return;

  document.getElementById("confirmBox").style.display = "none";
  document.getElementById("status").innerHTML = "Sending...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(pendingScan)
  })
  .then(res => res.json())
  .then(data => {
    const now = new Date().toLocaleString();

    if(data.status === "RECORDED"){
      document.getElementById("status").innerHTML =
        "🟢 " + pendingScan.name + ", " + pendingScan.studentId +
        " Successfully Scanned at " + now;
    } else if(data.status === "ALREADY_SCANNED"){
      document.getElementById("status").innerHTML =
        "🟡 Already Scanned<br>" + pendingScan.name;
    } else if(data.status === "SHEET_NOT_FOUND"){
      document.getElementById("status").innerHTML =
        "🔴 Sheet Not Found";
    } else {
      document.getElementById("status").innerHTML =
        "🔴 Error: " + (data.message || "Unknown error");
    }
  })
  .catch(err => {
    document.getElementById("status").innerHTML =
      "🔴 Network Error";
  })
  .finally(() => {
    pendingScan = null;
    resumeAfterDelay();
  });
}

function cancelScan(){
  document.getElementById("confirmBox").style.display = "none";
  document.getElementById("status").innerHTML = "Cancelled. Ready to scan again.";
  pendingScan = null;
  resumeAfterDelay();
}

function resumeAfterDelay(){
  setTimeout(() => {
    isProcessing = false;
    if(scanner){
      scanner.resume();
    }
  }, 1000);
}

function onScanFailure(error){
// ignore continuous scan errors
}
</script>
</body>
</html>
